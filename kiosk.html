<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kiosk</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --tile-default: #1c1c1c;
      --accent: #e05a00;
      --text: #f0ece4;
      --text-dim: #888880;
      --border: #2a2a2a;
      --gap: 10px;
      --radius: 4px;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    #kiosk-logo {
      height: 36px;
      width: auto;
      display: block;
    }

    #admin-trigger {
      width: 36px; height: 36px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: #333;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, border-color 0.2s;
      font-size: 18px;
    }
    #admin-trigger:hover { color: var(--text-dim); border-color: var(--border); }

    /* ─── GRID ───────────────────────────────────────── */
    #grid-wrap {
      position: fixed;
      top: 56px; left: 0; right: 0; bottom: 0;
      padding: var(--gap);
      display: grid;
      gap: var(--gap);
    }

    .tile {
      background: var(--tile-default);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: filter 0.12s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }

    .tile::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.12s;
    }

    .tile:hover::before { background: rgba(255,255,255,0.06); }
    .tile:active::before { background: rgba(0,0,0,0.25); }
    .tile:active { transform: scale(0.98); }

    .tile-icon {
      font-size: clamp(20px, 3vw, 36px);
      margin-bottom: 8px;
      line-height: 1;
    }

    .tile-label {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(14px, 2.2vw, 26px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.1;
      color: var(--text);
    }

    .tile-sub {
      font-family: var(--font-mono);
      font-size: clamp(9px, 1vw, 12px);
      color: rgba(240,236,228,0.45);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    /* accent bar on hover */
    .tile::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s;
    }
    .tile:hover::after { transform: scaleX(1); }

    /* ─── MODALS SHARED ──────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.active { opacity: 1; pointer-events: all; }

    .panel {
      background: #141414;
      border: 1px solid var(--border);
      border-radius: 6px;
      width: min(520px, 92vw);
      max-height: 88vh;
      overflow-y: auto;
      padding: 28px 24px 24px;
      font-family: var(--font-mono);
      transform: translateY(12px);
      transition: transform 0.2s;
    }
    .overlay.active .panel { transform: translateY(0); }

    .panel h2 {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    /* ─── PASSWORD MODAL ─────────────────────────────── */
    #pw-input {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 18px;
      letter-spacing: 0.25em;
      padding: 14px 16px;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    #pw-input:focus { border-color: var(--accent); }
    #pw-input.error { border-color: #cc2222; animation: shake 0.3s; }

    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
    }

    #pw-hint { font-size: 11px; color: var(--text-dim); margin-top: 10px; text-align: center; }

    /* ─── CONFIG PANEL ───────────────────────────────── */
    .config-section {
      margin-bottom: 22px;
    }
    .config-section label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .cfg-input {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .cfg-input:focus { border-color: var(--accent); }

    .cfg-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* button list */
    #btn-list { display: flex; flex-direction: column; gap: 8px; }

    .btn-row {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 28px 1fr 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .btn-row .color-swatch {
      width: 24px; height: 24px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      padding: 0;
      background-clip: padding-box;
    }

    .btn-row input[type="color"] {
      width: 24px; height: 24px;
      padding: 0; border: none;
      background: transparent;
      cursor: pointer;
    }

    .btn-row .cfg-input { padding: 6px 8px; font-size: 12px; }

    .btn-del {
      background: transparent;
      border: 1px solid #333;
      border-radius: var(--radius);
      color: #666;
      font-size: 14px;
      width: 26px; height: 26px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s;
      font-family: var(--font-mono);
    }
    .btn-del:hover { color: #cc2222; border-color: #cc2222; }

    .btn-add {
      width: 100%;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 9px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-add:hover { color: var(--text); border-color: #555; }

    /* action buttons */
    .action-row {
      display: flex; gap: 10px; margin-top: 20px;
    }

    .btn-save {
      flex: 1;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .btn-save:hover { filter: brightness(1.15); }

    .btn-cancel {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 12px 18px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .btn-cancel:hover { color: var(--text); }

    .save-status {
      font-size: 11px;
      text-align: center;
      margin-top: 10px;
      color: var(--text-dim);
      min-height: 16px;
    }
    .save-status.ok { color: #4a9; }
    .save-status.err { color: #c44; }

    /* col-count row */
    .col-option {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 9px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .col-option.selected, .col-option:hover {
      border-color: var(--accent);
      color: var(--text);
      background: #1c1c1c;
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* ─── IFRAME VIEWER ──────────────────────────────── */
    #viewer {
      position: fixed; inset: 0;
      z-index: 50;
      background: #fff;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    #viewer.open { transform: translateY(0); }

    #viewer-bar {
      height: 52px;
      background: var(--bg);
      border-bottom: 2px solid var(--accent);
      display: flex; align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 1;
    }

    #viewer-home {
      display: flex; align-items: center; gap: 8px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 18px;
      cursor: pointer;
      transition: filter 0.15s;
      white-space: nowrap;
    }
    #viewer-home:hover { filter: brightness(1.15); }
    #viewer-home:active { filter: brightness(0.9); }

    #viewer-title {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    #viewer-timer {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #444;
      white-space: nowrap;
      transition: color 0.3s;
    }
    #viewer-timer.warn { color: #cc5500; }

    #viewer-iframe {
      flex: 1;
      border: none;
      width: 100%;
    }

    /* iframe-blocked fallback */
    #viewer-blocked {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      gap: 16px;
    }
    #viewer-blocked.show { display: flex; }
    #viewer-blocked p {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }
    #viewer-blocked a {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px 20px;
      transition: background 0.15s;
    }
    #viewer-blocked a:hover { background: rgba(224,90,0,0.15); }

    /* ─── CLOCK ──────────────────────────────────────── */
    #clock {
      font-family: var(--font-mono);
      font-size: 12px;
      color: #3a3a38;
      letter-spacing: 0.08em;
    }
  </style>
</head>

    <div class="action-row" style="margin-top:16px">
      <button class="btn-save" onclick="checkPw()">Unlock</button>
      <button class="btn-cancel" onclick="closePwModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Config Panel -->
<div class="overlay scrollbar-hide" id="cfg-overlay">
  <div class="panel scrollbar-hide">
    <h2>Configure Kiosk</h2>

    <div class="config-section">
      <label>Kiosk Title</label>
      <input class="cfg-input" id="cfg-title" type="text" placeholder="My Kiosk">
    </div>

    <div class="config-section">
      <label>Columns <span style="color:#555;font-size:9px">— or leave blank to auto-fit</span></label>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="col-picker"></div>
    </div>

    <div class="config-section">
      <label>Accent Color</label>
      <div style="display:flex;gap:10px;align-items:center">
        <input type="color" id="cfg-accent" style="width:40px;height:36px;border:none;background:transparent;cursor:pointer">
        <input class="cfg-input" id="cfg-accent-hex" type="text" placeholder="#e05a00" style="flex:1">
      </div>
    </div>

    <div class="config-section">
      <label>Change Password <span style="color:#555;font-size:9px">— leave blank to keep current</span></label>
      <input class="cfg-input" id="cfg-pw" type="password" placeholder="new password">
    </div>

    <div class="config-section">
      <label>Buttons <span style="color:#555;font-size:9px">— label · url · color</span></label>
      <div id="btn-list"></div>
      <button class="btn-add" onclick="addBtn()" style="margin-top:8px">+ Add Button</button>
    </div>

    <div class="action-row">
      <button class="btn-save" onclick="saveConfig()">Save & Reload</button>
      <button class="btn-cancel" onclick="closeCfgModal()">Cancel</button>
    </div>
    <div class="save-status" id="save-status"></div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────
let CONFIG = {};
let adminUnlocked = false;

// ─── Boot ────────────────────────────────────────────────
async function boot() {
  try {
    const r = await fetch('config.json?_=' + Date.now());
    CONFIG = await r.json();
  } catch(e) {
    CONFIG = defaultConfig();
  }
  applyTheme();
  renderGrid();
  startClock();
}

function defaultConfig() {
  return {
    title: "Kiosk",
    columns: null,
    accent: "#e05a00",
    password_hash: "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918", // "admin"
    buttons: [
      { label: "Example", icon: "🔗", sub: "", color: "#1c1c1c", url: "https://example.com" }
    ]
  };
}

// ─── Theme ───────────────────────────────────────────────
function applyTheme() {
  if (CONFIG.accent) {
    document.documentElement.style.setProperty('--accent', CONFIG.accent);
  }
  document.title = CONFIG.title || 'Kiosk';
}

// ─── Grid Render ─────────────────────────────────────────
function renderGrid() {
  const wrap = document.getElementById('grid-wrap');
  wrap.innerHTML = '';
  const btns = CONFIG.buttons || [];
  const n = btns.length;
  if (!n) { wrap.innerHTML = '<div style="place-self:center;color:#333;font-family:var(--font-mono);font-size:13px">No buttons configured — click ⚙ to add some</div>'; return; }

  // columns: explicit or auto
  const cols = CONFIG.columns || autoColumns(n);
  wrap.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  // rows auto-fill
  const rows = Math.ceil(n / cols);
  wrap.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  btns.forEach((b, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.style.background = b.color || 'var(--tile-default)';
    tile.innerHTML = `
      ${b.icon ? `<div class="tile-icon">${escHtml(b.icon)}</div>` : ''}
      <div class="tile-label">${escHtml(b.label || 'Button ' + (i+1))}</div>
      ${b.sub ? `<div class="tile-sub">${escHtml(b.sub)}</div>` : ''}
    `;
    tile.addEventListener('click', () => launch(b.url, b.label, b.newtab));
    tile.addEventListener('touchend', (e) => { e.preventDefault(); launch(b.url, b.label, b.newtab); });
    wrap.appendChild(tile);
  });
}

function autoColumns(n) {
  if (n <= 2) return n;
  if (n <= 4) return 2;
  if (n <= 6) return 3;
  if (n <= 9) return 3;
  if (n <= 12) return 4;
  return Math.ceil(Math.sqrt(n));
}

function launch(url, label, newtab) {
  if (!url) return;
  if (newtab) {
    window.open(url, '_blank');
  } else {
    openViewer(url, label);
  }
}

// ─── Iframe Viewer ────────────────────────────────────────
const INACTIVITY_MS = 10 * 60 * 1000; // 10 minutes
let inactivityTimer = null;
let countdownInterval = null;
let viewerUrl = '';

function openViewer(url, label) {
  viewerUrl = url;
  const viewer = document.getElementById('viewer');
  const iframe = document.getElementById('viewer-iframe');
  const blocked = document.getElementById('viewer-blocked');
  const titleEl = document.getElementById('viewer-title');

  // reset blocked state
  blocked.classList.remove('show');
  iframe.style.display = '';
  iframe.src = url;
  titleEl.textContent = label || url;
  document.getElementById('viewer-blocked-link').href = url;

  // detect X-Frame-Options block (best-effort — load error or blank)
  iframe.onload = () => resetInactivity();
  iframe.onerror = () => showBlocked();

  viewer.classList.add('open');
  resetInactivity();
  // listen for activity inside the page (touch/click on viewer bar)
  document.getElementById('viewer-bar').addEventListener('pointerdown', resetInactivity);
}

function closeViewer() {
  const viewer = document.getElementById('viewer');
  const iframe = document.getElementById('viewer-iframe');
  viewer.classList.remove('open');
  clearInactivity();
  // small delay so slide-out animation plays before src clears
  setTimeout(() => {
    iframe.src = 'about:blank';
    document.getElementById('viewer-title').textContent = '';
    document.getElementById('viewer-timer').textContent = '';
    document.getElementById('viewer-timer').classList.remove('warn');
    document.getElementById('viewer-blocked').classList.remove('show');
    iframe.style.display = '';
  }, 320);
}

function showBlocked() {
  document.getElementById('viewer-iframe').style.display = 'none';
  document.getElementById('viewer-blocked').classList.add('show');
}

function resetInactivity() {
  clearInactivity();
  const timerEl = document.getElementById('viewer-timer');
  timerEl.classList.remove('warn');
  let remaining = INACTIVITY_MS;

  // countdown display — only show last 2 minutes
  countdownInterval = setInterval(() => {
    remaining -= 1000;
    if (remaining <= 120000) {
      const m = Math.floor(remaining / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      timerEl.textContent = `auto-home ${m}:${String(s).padStart(2,'0')}`;
      timerEl.classList.add('warn');
    } else {
      timerEl.textContent = '';
      timerEl.classList.remove('warn');
    }
    if (remaining <= 0) closeViewer();
  }, 1000);

  inactivityTimer = setTimeout(closeViewer, INACTIVITY_MS);
}

function clearInactivity() {
  clearTimeout(inactivityTimer);
  clearInterval(countdownInterval);
  inactivityTimer = null;
  countdownInterval = null;
}

// ─── Clock ───────────────────────────────────────────────
function startClock() {
  const el = document.getElementById('clock');
  function tick() {
    const d = new Date();
    el.textContent = d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
  }
  tick();
  setInterval(tick, 10000);
}

// ─── Password Modal ───────────────────────────────────────
function openPwModal() {
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-input').classList.remove('error');
  document.getElementById('pw-hint').textContent = 'Enter admin password to configure';
  document.getElementById('pw-overlay').classList.add('active');
  setTimeout(() => document.getElementById('pw-input').focus(), 200);
}
function closePwModal() {
  document.getElementById('pw-overlay').classList.remove('active');
}

async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const hash = await sha256(val);
  const stored = CONFIG.password_hash || '';
  if (hash === stored.toLowerCase()) {
    closePwModal();
    openCfgModal();
  } else {
    const inp = document.getElementById('pw-input');
    inp.classList.add('error');
    document.getElementById('pw-hint').textContent = 'Incorrect password';
    inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 500);
  }
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ─── Config Modal ─────────────────────────────────────────
function openCfgModal() {
  // populate fields
  document.getElementById('cfg-title').value = CONFIG.title || '';
  document.getElementById('cfg-accent').value = CONFIG.accent || '#e05a00';
  document.getElementById('cfg-accent-hex').value = CONFIG.accent || '#e05a00';
  document.getElementById('cfg-pw').value = '';
  buildColPicker();
  buildBtnList();
  document.getElementById('save-status').textContent = '';
  document.getElementById('cfg-overlay').classList.add('active');

  // sync color picker <-> hex
  document.getElementById('cfg-accent').oninput = function() {
    document.getElementById('cfg-accent-hex').value = this.value;
  };
  document.getElementById('cfg-accent-hex').oninput = function() {
    if (/^#[0-9a-fA-F]{6}$/.test(this.value)) {
      document.getElementById('cfg-accent').value = this.value;
    }
  };
}

function closeCfgModal() {
  document.getElementById('cfg-overlay').classList.remove('active');
}

function buildColPicker() {
  const p = document.getElementById('col-picker');
  p.innerHTML = '';
  ['Auto', '2', '3', '4', '5', '6'].forEach(v => {
    const b = document.createElement('button');
    b.className = 'col-option';
    b.textContent = v;
    b.dataset.val = v === 'Auto' ? '' : v;
    const cur = CONFIG.columns ? String(CONFIG.columns) : '';
    if (b.dataset.val === cur) b.classList.add('selected');
    b.onclick = () => {
      p.querySelectorAll('.col-option').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    };
    p.appendChild(b);
  });
}

function buildBtnList() {
  const list = document.getElementById('btn-list');
  list.innerHTML = '';
  (CONFIG.buttons || []).forEach((b, i) => addBtnRow(b, i));
}

function addBtnRow(b = {}, idx = null) {
  const list = document.getElementById('btn-list');
  const row = document.createElement('div');
  row.className = 'btn-row';
  const color = b.color || '#1c1c1c';
  row.innerHTML = `
    <input type="color" class="color-swatch" value="${color}" title="Tile color">
    <input class="cfg-input" type="text" placeholder="Label" value="${escAttr(b.label||'')}">
    <input class="cfg-input" type="text" placeholder="URL or URI" value="${escAttr(b.url||'')}">
    <button class="btn-del" onclick="this.closest('.btn-row').remove()">×</button>
  `;
  list.appendChild(row);
}

function addBtn() {
  addBtnRow({ label: '', url: '', color: '#1c1c1c' });
  // scroll to bottom
  const list = document.getElementById('btn-list');
  list.lastChild.querySelector('input[type=text]').focus();
}

async function saveConfig() {
  const status = document.getElementById('save-status');
  status.textContent = 'Saving…';
  status.className = 'save-status';

  // collect values
  const title = document.getElementById('cfg-title').value.trim();
  const accentHex = document.getElementById('cfg-accent-hex').value.trim() || document.getElementById('cfg-accent').value;
  const colSel = document.querySelector('#col-picker .col-option.selected');
  const columns = colSel && colSel.dataset.val ? parseInt(colSel.dataset.val) : null;

  const pwVal = document.getElementById('cfg-pw').value;
  let pw_hash = CONFIG.password_hash;
  if (pwVal) pw_hash = await sha256(pwVal);

  // collect buttons
  const rows = document.querySelectorAll('.btn-row');
  const buttons = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const color = inputs[0].value;
    const label = inputs[1].value.trim();
    const url = inputs[2].value.trim();
    if (label || url) buttons.push({ label, url, color });
  });

  const newConfig = { title, columns, accent: accentHex, password_hash: pw_hash, buttons };

  try {
    const r = await fetch('/save-config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newConfig, null, 2)
    });
    if (!r.ok) throw new Error('Server error');
    status.textContent = '✓ Saved — reloading…';
    status.className = 'save-status ok';
    CONFIG = newConfig;
    setTimeout(() => {
      closeCfgModal();
      applyTheme();
      renderGrid();
    }, 900);
  } catch(e) {
    // fallback: no server, just apply in-memory
    status.textContent = '⚠ No server — changes applied in-memory only (not persisted)';
    status.className = 'save-status err';
    CONFIG = newConfig;
    setTimeout(() => {
      closeCfgModal();
      applyTheme();
      renderGrid();
    }, 1600);
  }
}

// ─── Utils ───────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;');
}

// ─── Prevent context menu / text selection on kiosk ──────
document.addEventListener('contextmenu', e => e.preventDefault());
// Reset inactivity on any interaction while viewer is open
document.addEventListener('pointerdown', () => {
  if (document.getElementById('viewer').classList.contains('open')) resetInactivity();
});

// ─── Go ──────────────────────────────────────────────────
boot();
</script>
</body>
</html>
